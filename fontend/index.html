<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoloHome Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="min-h-screen text-slate-800 p-4 lg:p-8">
    
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-slate-600 font-medium">Hi Khang,</p>
                <h1 class="text-4xl font-bold tracking-tight">Welcome to your home</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass-card px-4 py-2 rounded-full flex items-center gap-2">
                    <i class="fa-solid fa-droplet text-blue-500"></i>
                    <span id="header-humi">0%</span>
                    <i class="fa-solid fa-temperature-half text-orange-500 ml-2"></i>
                    <span id="header-temp">0°</span>
                </div>
                <div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center border-2 border-white shadow-sm">
                    <i class="fa-solid fa-user text-slate-400 text-xl"></i>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
            
            <div class="lg:col-span-8 flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden h-64">
                        <h3 class="text-sm font-bold text-slate-500 mb-4 uppercase tracking-wider">Temperature Log</h3>
                        <canvas id="tempChart"></canvas>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden h-64">
                        <h3 class="text-sm font-bold text-slate-500 mb-4 uppercase tracking-wider">Humidity Log</h3>
                        <canvas id="humiChart"></canvas>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 flex-grow">
                    <div class="white-card p-5 rounded-[2.5rem] flex flex-col justify-between h-56 transition-all hover:scale-[1.02]">
                        <div class="w-full h-24 flex items-center justify-center mb-2 overflow-hidden">
                            <img src="assets/smart_lamp.png" alt="Lamp" class="h-full object-contain">
                        </div>
                        <div class="px-2">
                            <h4 class="font-bold text-lg leading-tight">Smart Lamp</h4>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">RGB Light</p>
                        </div>
                        <div class="px-2 pb-1">
                            <label class="toggle-switch">
                                <input type="checkbox" onchange="toggle('led', this)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="white-card p-5 rounded-[2.5rem] flex flex-col justify-between h-56 transition-all hover:scale-[1.02]">
                        <div class="w-full h-24 flex items-center justify-center mb-2 overflow-hidden">
                            <img src="assets/smart_fan.png" alt="Fan" class="h-full object-contain">
                        </div>
                        <div class="px-2">
                            <h4 class="font-bold text-lg leading-tight">Smart Fan</h4>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">PWM Control</p>
                        </div>
                        <div class="px-2 pb-1">
                            <label class="toggle-switch">
                                <input type="checkbox" onchange="toggle('fan', this)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <div class="white-card p-5 rounded-[2.5rem] flex flex-col justify-between h-56 transition-all hover:scale-[1.02]">
                        <div class="w-full h-24 flex items-center justify-center mb-2 overflow-hidden">
                            <img src="assets/smart_lock.png" id="servo-img" alt="Gate" class="h-full object-contain">
                        </div>
                        <div class="px-2">
                            <h4 class="font-bold text-lg leading-tight">Smart Lock</h4>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">Servo Simulation</p>
                        </div>
                        <div class="px-2 pb-1">
                            <label class="toggle-switch">
                                <input type="checkbox" onchange="toggle('servo', this)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 h-full">
                <div class="glass-card rounded-[2.5rem] flex flex-col h-full relative overflow-hidden">
                    
                    <div class="weather-image-frame w-full h-40 flex items-center justify-center">
                        <img src="assets/toppng.com-real-sun-and-clouds-5000x3232.png" alt="Weather" class="h-25 object-contain opacity-80 mt-4">
                    </div>

                    <div class="flex-grow flex flex-col justify-center items-center text-center px-8 z-10 py-4">
                        <div class="text-slate-700 text-base font-medium mb-1" id="current-date">--/--</div>
                        <div class="text-8xl font-light tracking-tight"><span id="big-temp">00</span>°</div>
                        <div class="text-slate-500 font-medium">Indoor temperature</div>
                    </div>

                    <div class="sensor-footer p-8 rounded-b-[2.5rem] w-full mt-auto">
                        <div class="grid grid-cols-2 gap-6 text-slate-700">
                            <div>
                                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest">Distance</p>
                                <p class="font-bold text-3xl"><span id="dist-val">0</span> <span class="text-sm font-normal">cm</span></p>
                            </div>
                            <div>
                                <p class="text-xs text-slate-400 uppercase font-bold tracking-widest">Ambient Light</p>
                                <p class="font-bold text-3xl"><span id="light-val">0</span> <span class="text-sm font-normal">%</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
